<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Sign In</title>
    <link rel="stylesheet" href="styles/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>
<body>

    <div class="auth-page">
        <div class="auth-left">
            <div class="auth-left-content">
                <a href="index.html" class="auth-logo">
                    <i class="fas fa-check-circle"></i>
                    <span>TaskFlow</span>
                </a>
                <h1>Welcome Back</h1>
                <p>Sign in to continue managing your tasks and boosting your productivity.</p>
                <div class="auth-illustration">
                    <div class="auth-float-card">
                        <i class="fas fa-chart-line"></i>
                        <div>
                            <strong>Stay Productive</strong>
                            <span>Track all your tasks in one place</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="auth-right">
            <div class="auth-form-container">
                <h2>Sign In</h2>
                <p class="auth-form-subtitle">Enter your credentials to access your dashboard</p>

           
                <div id="loginAlert" class="alert" style="display: none;"></div>

                <form id="loginForm" class="auth-form" onsubmit="return false;">
                    <!-- Email Input -->
                    <div class="form-group">
                        <label for="loginEmail">
                            <i class="fas fa-envelope"></i> Email Address
                        </label>
                        <input 
                            type="email" 
                            id="loginEmail" 
                            placeholder="Enter your email" 
                            required 
                            autocomplete="email"
                        >
                    </div>

                    <!-- Password Input -->
                    <div class="form-group">
                        <label for="loginPassword">
                            <i class="fas fa-lock"></i> Password
                        </label>
                        <div class="password-wrapper">
                            <input 
                                type="password" 
                                id="loginPassword" 
                                placeholder="Enter your password" 
                                required 
                                autocomplete="current-password"
                            >
                            <button type="button" class="toggle-password" onclick="togglePasswordVisibility('loginPassword', this)">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="btn btn-primary btn-block" id="loginBtn">
                        <i class="fas fa-sign-in-alt"></i> Sign In
                    </button>
                </form>

                <p class="auth-switch">
                    Don't have an account? <a href="signup.html">Create one</a>
                </p>
            </div>
        </div>
    </div>
 
</body>
  
     <script src="scripts/script.js" defer></script>
</html>
